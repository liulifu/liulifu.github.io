<!DOCTYPE html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}">
    
    <!-- 保留原有样式 -->
    <link rel="stylesheet" href="{{ '/reset.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/index.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/mobile.css' | relative_url }}" media="screen and (max-width: 768px)">
    
    {% seo %}
    {% feed_meta %}
</head>
<body>
    <header>
        <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
        <nav>
            <a href="{{ '/' | relative_url }}">Home</a>
            <a href="{{ '/categories/dba/' | relative_url }}">DBA</a>
            <a href="{{ '/categories/devops/' | relative_url }}">DevOps</a>
            <a href="{{ '/categories/biopharma/' | relative_url }}">Biopharma</a>
            <a href="{{ '/categories/enterprise/' | relative_url }}">Enterprise</a>
            <a href="{{ '/categories/notes/' | relative_url }}">Notes</a>
            <a href="{{ '/about/' | relative_url }}">About</a>
        </nav>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <p>&copy; {{ 'now' | date: "%Y" }} {{ site.author }}. All rights reserved.</p>
    </footer>
</body>
</html>
