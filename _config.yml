# Jekyll 配置文件
title: Lifu's Tech Blog
description: DBA、DevOps、Biopharma、Enterprise IT 技术博客
author: Lifu
email: lifu.liu@example.com
url: "https://liulifu.github.io"
baseurl: ""

# 构建设置
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# 永久链接格式
permalink: /posts/:categories/:title/

# 分页设置
paginate: 20
paginate_path: "/page:num/"

# 集合配置
collections:
  posts:
    output: true
    permalink: /posts/:categories/:title/

# 默认值
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Lifu"

# 分类
categories:
  - dba
  - devops
  - biopharma
  - enterprise
  - notes
  - csv

# 排除文件
exclude:
  - generate_index_v2.py
  - randomize_dates.py
  - publish.py
  - blog_workflow.md
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

# 时区
timezone: Asia/Shanghai

# 语言
lang: zh-CN

